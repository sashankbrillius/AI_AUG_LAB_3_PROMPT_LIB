groups:
  - name: prompt-library-alerts
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{service="prompt-library",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="prompt-library"}[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Prompt Library gateway error rate above 5%"

      - alert: LowPromptQuality
        expr: histogram_quantile(0.50, sum(rate(prompt_quality_score_bucket{service="prompt-library"}[10m])) by (le)) < 0.5
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Median prompt quality score below 0.5 — prompts may need improvement"
